spring:
  application:
    name: finance-control-backend

  # Por defecto usa H2 (dev). Cambia a 'prod' para PostgreSQL.
  profiles:
    active: prod

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

# Gmail OAuth2 - configurar con tus credenciales de Google Cloud Console
gmail:
  credentials-file: classpath:credentials.json
  tokens-directory: ./tokens
  application-name: Finance Control

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/financedb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://finance-control-ddbb-financecontrol-vfhthq.postgresql.hostinger.com:5432/ddbb_financecontrol
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
