services:
  db:
    image: postgres:16-alpine
    container_name: finance-control-db
    environment:
      POSTGRES_DB: financecontrol
      POSTGRES_USER: ${DB_USERNAME:-finance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finance}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
